############################################################
# streamkernel_delta_spark_local.properties
# Purpose : Synthetic -> DETERMINISTIC_ENRICHMENT -> Delta Lake
# Goal    : Public local lakehouse proof using MinIO-backed Delta and Spark
#           validation, without model artifacts or in-process inference.
############################################################

# --- Pipeline ---
pipeline.id=sk-delta-spark-local
pipeline.parallelism=1
pipeline.batch.size=128
pipeline.drain.timeout.ms=180000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# --- Source: Synthetic ---
source.type=SYNTHETIC
source.synthetic.payload.size=256
source.synthetic.buffer.size=131072
source.synthetic.high.entropy=false
source.synthetic.text.profile=DATABRICKS
source.synthetic.max.records.per.second=2000
source.unsafe.reuse.batch=true
streamkernel.source.fetch.lock=false

# --- Transform ---
transform.chain=DETERMINISTIC_ENRICHMENT
transform.deterministic_enrichment.dimension=16
transform.version=deterministic-enrichment-delta-v1
feature.version=public-lakehouse-features-v1
model.name=deterministic-public-enrichment
model.version=1
model.stage=demo

# --- Sink: Delta Lake on MinIO ---
sink.type=DELTA
delta.table.path=s3a://streamkernel-delta/enriched-tickets-public
delta.table.create.if.missing=true
delta.checkpoint.interval=50
delta.commit.max.retries=5
delta.commit.coalesce.max.rows=4096
delta.commit.coalesce.max.wait.ms=2000
delta.strict.payload.type=true
delta.s3.endpoint=http://localhost:9000
delta.s3.access.key=minioadmin
delta.s3.secret.key=minioadmin
delta.s3.region=us-east-1
delta.s3.path.style.access=true
delta.s3.ssl.enabled=false
delta.s3.local.tmp.dir=.streamkernel-tmp/delta-s3a

# --- Cache / DLQ / Security ---
cache.type=NOOP
dlq.type=DEVNULL
security.type=PERMIT_ALL
streamkernel.provenance.enabled=true

# --- StreamKernel backpressure ---
streamkernel.sink.inflight.max=256
streamkernel.sink.batch.copy=false
streamkernel.executor.mode=FIXED
streamkernel.latency.enabled=false
streamkernel.metrics.latency.enabled=false
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8080
metrics.tag.profile=sk-delta-spark-local
metrics.tag.mode=local
metrics.tag.run_id=${sys:sk.run.id:delta-spark-local}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=30
streamkernel.print.config.enabled=true
streamkernel.bench.auto.stop.after.seconds=60
streamkernel.bench.print.cfg.keys=pipeline.parallelism,pipeline.batch.size,source.synthetic.text.profile,source.synthetic.max.records.per.second,transform.chain,transform.deterministic_enrichment.dimension,sink.type,delta.checkpoint.interval,delta.commit.coalesce.max.rows,delta.commit.coalesce.max.wait.ms,delta.table.path,metrics.provider
