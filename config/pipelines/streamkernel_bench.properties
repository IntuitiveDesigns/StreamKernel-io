############################################################
# streamkernel_synthetic-devnull-max.properties
# Purpose : Synthetic -> NOOP -> DEVNULL
# Goal    : Absolute orchestrator + source ceiling ? no IO, no feature overhead.
#           Use this to measure the maximum events/sec the orchestrator can
#           dispatch before any transform, sink, or cache work is introduced.
#           Compare against streamkernel_source_baseline_uncorked.properties
#           to validate batch size and parallelism scaling.
############################################################

# --- Pipeline ---
pipeline.id=sk-source-baseline-devnull-max
pipeline.parallelism=12
pipeline.batch.size=5000
pipeline.drain.timeout.ms=15000

# --- Source: Synthetic ---
# Small payload maximises ceiling throughput. Not representative of production
# payload sizes ? this profile measures the orchestrator, not the data path.
source.type=SYNTHETIC
source.synthetic.payload.size=64
source.synthetic.buffer.size=4194304
source.synthetic.entropy=LOW
source.unsafe.reuse.batch=true
streamkernel.source.fetch.lock=false

# --- Transform (no work) ---
transform.chain=NOOP

# --- Sink (no IO) ---
sink.type=KAFKA
sink.plugin.id=KAFKA
sink.kafka.bootstrap.servers=localhost:9092
sink.kafka.topic=arena-bench-test
sink.kafka.acks=1
sink.kafka.batch.size=524288
sink.kafka.linger.ms=10
sink.kafka.compression.type=lz4
dlq.type=DEVNULL

# --- Cache (disabled for ceiling) ---
cache.type=NOOP

# --- StreamKernel backpressure ---
# Set high to ensure the DEVNULL sink is never the bottleneck.
# DEVNULL discards synchronously so inflight pressure is near-zero in practice.
streamkernel.sink.inflight.max=5000000
streamkernel.sink.error.log.interval.ms=10000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8080
metrics.tag.profile=sk-synthetic-devnull-max
metrics.tag.mode=default
metrics.tag.run_id=${env:SK_RUN_ID:dev}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=5
streamkernel.print.config.enabled=true
streamkernel.bench.print.cfg.keys=pipeline.parallelism,pipeline.batch.size,transform.chain,streamkernel.speedometer.window.seconds,streamkernel.sink.inflight.max,metrics.provider

# --- Security ---
security.type=PERMIT_ALL