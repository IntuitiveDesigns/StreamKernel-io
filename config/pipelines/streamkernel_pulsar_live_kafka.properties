############################################################
# streamkernel_pulsar_live_kafka.properties
# Purpose : Live Pulsar producer -> STRING_TO_WIREEVENT -> Kafka
# Goal    : Public live-pressure source proof while Pulsar continues
#           producing during the benchmark window.
############################################################

# --- Pipeline ---
pipeline.id=sk-pulsar-live-kafka
pipeline.parallelism=4
pipeline.batch.size=128
pipeline.drain.timeout.ms=180000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# --- Source: Pulsar ---
source.type=PULSAR
source.pulsar.service.url=pulsar://localhost:6650
source.pulsar.topic=persistent://public/default/streamkernel-bench-live
source.pulsar.subscription=streamkernel-pulsar-kafka-live
source.pulsar.subscription.type=Exclusive
source.pulsar.subscription.initial.position=EARLIEST
source.pulsar.batch.size=128
source.pulsar.poll.ms=25
source.pulsar.receiver.queue.size=1024
source.pulsar.acknowledge.on.fetch=true

# --- Transform ---
transform.chain=STRING_TO_WIREEVENT
transform.string_to_wireevent.use.payload.id.as.key=true
transform.string_to_wireevent.trim=true
transform.version=pulsar-live-wireevent-kafka-v1

# --- Sink: Kafka ---
sink.type=KAFKA
sink.plugin.id=KAFKA
sink.kafka.bootstrap.servers=localhost:9092
sink.kafka.topic=streamkernel-pulsar-live-out
sink.kafka.client.id=sk-pulsar-live-kafka
sink.kafka.acks=1
sink.kafka.linger.ms=5
sink.kafka.batch.size=131072
sink.kafka.buffer.memory=268435456
sink.kafka.compression.type=lz4
sink.kafka.max.in.flight.requests.per.connection=5

# --- Cache / DLQ / Security ---
cache.type=NOOP
dlq.type=DEVNULL
security.type=PERMIT_ALL
streamkernel.provenance.enabled=true

# --- StreamKernel backpressure ---
streamkernel.sink.inflight.max=50000
streamkernel.sink.batch.copy=false
streamkernel.executor.mode=FIXED
streamkernel.latency.enabled=false
streamkernel.metrics.latency.enabled=false
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8080
metrics.tag.profile=sk-pulsar-live-kafka
metrics.tag.mode=local
metrics.tag.run_id=${sys:sk.run.id:pulsar-live-kafka}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=5
streamkernel.print.config.enabled=true
streamkernel.bench.auto.stop.after.seconds=60
streamkernel.bench.print.cfg.keys=pipeline.parallelism,pipeline.batch.size,source.type,source.pulsar.topic,source.pulsar.subscription,source.pulsar.batch.size,transform.chain,sink.type,sink.kafka.topic,metrics.provider
