############################################################
# streamkernel_backpressure_saturation.properties
# Purpose : Back-pressure and flow control validation.
#           Synthetic -> STRING_TO_WIREEVENT -> Kafka with
#           deliberately tight inflight ceiling.
# Goal    : Prove StreamKernel parks workers gracefully when the sink
#           cannot keep up, rather than OOMing, dropping records silently,
#           or crashing. Flow control is a non-negotiable enterprise requirement
#           for any pipeline that feeds into a regulated data store.
#
# How back-pressure is induced here:
#   streamkernel.sink.inflight.max is set to a small value relative to
#   parallelism x batchSize. When the Kafka producer's in-flight requests
#   fill this ceiling, workers park (yield / sleep) rather than submitting
#   more batches. This prevents heap exhaustion under slow-broker conditions.
#
#   Additionally, sink.kafka.linger.ms=50 and acks=all slow the producer
#   intentionally, creating realistic back-pressure rather than an artificial
#   ceiling that never triggers in practice.
#
# Run protocol:
#   Phase 1 — Normal operation:
#     Run as-is. Observe PROC_EPS and note that workers park periodically.
#     MEM should be flat. DROPPED=0. EMPTY=0.
#
#   Phase 2 — Saturate the sink:
#     Reduce streamkernel.sink.inflight.max to 100 (edit and restart).
#     Observe: PROC_EPS drops, workers park more frequently.
#     CRITICAL CHECK: MEM stays flat. DROPPED stays 0. No OOM.
#     This proves the ceiling is enforced, not bypassed.
#
#   Phase 3 — Remove ceiling:
#     Restore streamkernel.sink.inflight.max to 50000.
#     Observe: PROC_EPS recovers without restart.
#
# Acquisition evidence targets:
#   - Grafana: streamkernel_jvm_heap_used_mb flat during Phase 2
#   - Speedometer: DROPPED=0 throughout all phases
#   - Speedometer: EMPTY=0 (source never starved — back-pressure is at sink)
#   - Log: No OutOfMemoryError, no unhandled exceptions
############################################################

# --- Pipeline ---
pipeline.id=sk-backpressure-saturation
pipeline.parallelism=12
pipeline.batch.size=1000
pipeline.drain.timeout.ms=15000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# --- Source: Synthetic ---
# Large buffer ensures source is never the bottleneck.
# Back-pressure should originate at the sink, not the source.
source.type=SYNTHETIC
source.synthetic.payload.size=512
source.synthetic.buffer.size=524288
source.synthetic.entropy=LOW
source.unsafe.reuse.batch=true
streamkernel.source.fetch.lock=false

# --- Transform ---
transform.chain=STRING_TO_WIREEVENT
transform.string_to_wireevent.default.key=sk
transform.string_to_wireevent.use.payload.id.as.key=true

# --- Sink: Kafka (intentionally slowed to induce back-pressure) ---
sink.type=KAFKA
sink.plugin.id=KAFKA
sink.kafka.bootstrap.servers=localhost:9092
sink.kafka.topic=arena-bench-test
dlq.type=DEVNULL
# acks=all + linger.ms=50 slows producer completion, creating realistic
# back-pressure. This is more representative than an artificial ceiling
# that never fires against a fast local broker.
sink.kafka.acks=all
sink.kafka.enable.idempotence=true
sink.kafka.retries=2147483647
sink.kafka.delivery.timeout.ms=120000
sink.kafka.max.in.flight.requests.per.connection=5
sink.kafka.linger.ms=50
sink.kafka.batch.size=262144
sink.kafka.buffer.memory=268435456
sink.kafka.compression.type=lz4

# --- StreamKernel back-pressure ceiling ---
# This is the primary knob under test.
# Phase 1: 50000 (loose — workers rarely park)
# Phase 2: 100    (tight — workers park frequently, MEM must stay flat)
# Formula for minimum safe value: parallelism x batchSize = 12 x 1000 = 12000
# Setting below this guarantees workers park on every cycle.
streamkernel.sink.inflight.max=50000
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8082
metrics.tag.profile=sk-backpressure-saturation
metrics.tag.mode=default
metrics.tag.run_id=${env:SK_RUN_ID:dev}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
# 10s window: smooths out the park/resume cycles so Grafana shows
# a clean average rather than sawtooth noise.
streamkernel.speedometer.window.seconds=10
streamkernel.print.config.enabled=true
streamkernel.bench.print.cfg.keys=pipeline.parallelism,pipeline.batch.size,transform.chain,streamkernel.speedometer.window.seconds,streamkernel.sink.inflight.max,metrics.provider

# --- Security ---
security.type=PERMIT_ALL
