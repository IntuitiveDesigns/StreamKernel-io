############################################################
# streamkernel_kafka_exactly_once_baseline.properties
# Purpose : Synthetic -> STRING_TO_WIREEVENT -> Kafka
# Goal    : Exactly-once semantics (EOS) throughput baseline.
#           Measures the cost of full EOS guarantees vs at-least-once.
#
# Delivery semantics: EXACTLY-ONCE
#   acks=all                        ? all in-sync replicas must ack.
#   enable.idempotence=true         ? deduplication at the producer level (PID + sequence).
#   transactional.id=<stable-id>    ? enables atomic multi-partition writes.
#   max.in.flight.requests=5        ? safe with idempotence enabled (Kafka 1.1+).
#   retries=MAX_INT                 ? producer retries indefinitely; pipeline must be
#                                     prepared for delivery.timeout.ms to bound total time.
#
# EOS cost vs at-least-once:
#   Expect 20-40% lower PROC_EPS due to:
#     - AddPartitionsToTxn + EndTxn RPCs per batch
#     - acks=all waiting for ISR replication
#     - Reduced linger.ms effectiveness (transaction commits bound latency)
#   This overhead is the honest cost of strong guarantees. Document it in acquisition materials.
#
# Consumer-side note:
#   Producers configured here provide EOS at the Kafka layer.
#   Consumers must set isolation.level=read_committed to observe exactly-once semantics end-to-end.
############################################################

# --- Pipeline ---
pipeline.id=sk-kafka-exactly-once-baseline
pipeline.parallelism=12
pipeline.batch.size=500
pipeline.drain.timeout.ms=30000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# --- Source: Synthetic ---
source.type=SYNTHETIC
source.synthetic.payload.size=512
source.synthetic.buffer.size=524288
source.synthetic.entropy=LOW
source.unsafe.reuse.batch=true
streamkernel.source.fetch.lock=false

# --- Transform ---
transform.chain=STRING_TO_WIREEVENT
transform.string_to_wireevent.default.key=sk
transform.string_to_wireevent.use.payload.id.as.key=true

# --- Sink: Kafka (EOS producer configuration) ---
sink.type=KAFKA
sink.plugin.id=KAFKA
sink.kafka.bootstrap.servers=localhost:9092
sink.kafka.topic=arena-bench-test
dlq.type=DEVNULL
# EOS requires acks=all. Non-negotiable.
sink.kafka.acks=all
sink.kafka.enable.idempotence=true
# Stable transactional ID ? must be unique per producer instance in production.
# For multi-worker pipelines, the KafkaSink plugin must append a worker index suffix.
sink.kafka.transactional.id=streamkernel-eos-bench-1
# retries=MAX_INT combined with delivery.timeout.ms bounds total retry duration.
sink.kafka.retries=2147483647
sink.kafka.delivery.timeout.ms=120000
# max.in.flight=5 is safe with idempotence (Kafka 1.1+).
sink.kafka.max.in.flight.requests.per.connection=5
sink.kafka.linger.ms=5
sink.kafka.batch.size=262144
sink.kafka.buffer.memory=268435456
sink.kafka.compression.type=lz4

# --- StreamKernel backpressure ---
streamkernel.sink.inflight.max=500000
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8080
metrics.tag.profile=sk-kafka-exactly-once-baseline
metrics.tag.mode=default
metrics.tag.run_id=${env:SK_RUN_ID:dev}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=5
streamkernel.print.config.enabled=true
streamkernel.bench.print.cfg.keys=pipeline.parallelism,pipeline.batch.size,transform.chain,streamkernel.speedometer.window.seconds,streamkernel.sink.inflight.max,metrics.provider

# --- Security ---
security.type=PERMIT_ALL