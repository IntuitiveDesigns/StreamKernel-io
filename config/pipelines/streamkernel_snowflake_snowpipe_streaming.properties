############################################################
# streamkernel_snowflake_snowpipe_streaming.properties
# Purpose : Synthetic -> DETERMINISTIC_ENRICHMENT -> Snowflake Snowpipe Streaming
# Goal    : Public warehouse landing proof with provenance metadata and
#           JVM-native Snowpipe Streaming writes.
############################################################

# --- Pipeline ---
pipeline.id=sk-snowflake-snowpipe-streaming
pipeline.parallelism=4
pipeline.batch.size=64
pipeline.drain.timeout.ms=180000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# --- Source: Synthetic ---
source.type=SYNTHETIC
source.synthetic.payload.size=256
source.synthetic.buffer.size=131072
source.synthetic.high.entropy=false
source.synthetic.text.profile=DATABRICKS
source.unsafe.reuse.batch=true
streamkernel.source.fetch.lock=false

# --- Transform chain ---
transform.chain=DETERMINISTIC_ENRICHMENT
transform.deterministic_enrichment.dimension=16
transform.version=deterministic-enrichment-snowflake-v1
feature.version=public-warehouse-features-v1
model.name=deterministic-public-enrichment
model.version=1
model.stage=demo

# --- Sink: Snowflake Snowpipe Streaming ---
sink.type=SNOWFLAKE_SNOWPIPE_STREAMING
sink.plugin.id=SNOWFLAKE_SNOWPIPE_STREAMING
snowflake.account=${env:SNOWFLAKE_ACCOUNT}
snowflake.user=${env:SNOWFLAKE_USER}
snowflake.database=${env:SNOWFLAKE_DATABASE:STREAMKERNEL}
snowflake.schema=${env:SNOWFLAKE_SCHEMA:PUBLIC}
snowflake.pipe=${env:SNOWFLAKE_PIPE:STREAMKERNEL_PIPE}
snowflake.channel.name=${env:SNOWFLAKE_CHANNEL:streamkernel-public}
snowflake.role=${env:SNOWFLAKE_ROLE:STREAMKERNEL_ROLE}
snowflake.warehouse=${env:SNOWFLAKE_WAREHOUSE:COMPUTE_WH}
snowflake.private.key.file=${env:SNOWFLAKE_PRIVATE_KEY_FILE:}
snowflake.flush.on.write=true
snowflake.commit.timeout.ms=120000
snowflake.property.max_client_lag=5 seconds

# Expected table columns:
# event_id, event_key, event_ts, payload_type, payload_text, source_text,
# sentiment, embedding, metadata, pipeline_id, run_id, source_type, sink_type,
# source_auth, sink_auth, security_type, transform_chain, transform_version,
# feature_version, prompt_version, model_name, model_alias, model_version,
# model_run_id, model_experiment_id, model_stage, inference_timestamp,
# config_sha256, policy_sha256

# --- Cache / DLQ / Security ---
cache.type=NOOP
dlq.type=DEVNULL
security.type=PERMIT_ALL
streamkernel.provenance.enabled=true

# --- StreamKernel backpressure ---
streamkernel.sink.inflight.max=1024
streamkernel.sink.batch.copy=false
streamkernel.executor.mode=FIXED
streamkernel.latency.enabled=false
streamkernel.metrics.latency.enabled=false
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8080
metrics.tag.mode=local
metrics.tag.profile=sk-snowflake-snowpipe-streaming
metrics.tag.run_id=${sys:sk.run.id:snowflake-streaming}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=5
streamkernel.print.config.enabled=true
streamkernel.bench.auto.stop.after.seconds=60
streamkernel.bench.print.cfg.keys=source.synthetic.text.profile,pipeline.parallelism,pipeline.batch.size,transform.chain,transform.deterministic_enrichment.dimension,sink.type,snowflake.database,snowflake.schema,snowflake.pipe,snowflake.channel.name,metrics.provider
