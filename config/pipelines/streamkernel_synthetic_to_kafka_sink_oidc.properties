############################################################
# streamkernel_synthetic_to_kafka_sink_oidc.properties
# Purpose : Synthetic -> Kafka with local OIDC client credentials
# Goal    : Exercise Kafka sink OIDC auth and provenance headers
#           against the local Docker Compose Keycloak + broker stack.
############################################################

streamkernel.provenance.enabled=true

# --- Pipeline ---
pipeline.id=sk-synthetic-to-kafka-sink-oidc
pipeline.parallelism=4
pipeline.batch.size=64
pipeline.drain.timeout.ms=15000

# --- Source: Synthetic ---
source.type=SYNTHETIC
source.synthetic.mode=INLINE
source.synthetic.format=JSON
source.synthetic.payload.size=1024
source.synthetic.buffer.size=524288
source.synthetic.entropy=LOW
source.unsafe.reuse.batch=true
streamkernel.source.fetch.lock=false

# --- Transform (no work) ---
transform.chain=NOOP

# --- Sink: Kafka over OIDC ---
sink.type=KAFKA
sink.plugin.id=KAFKA
sink.kafka.bootstrap.servers=localhost:9095
sink.kafka.topic=streamkernel-oidc
sink.kafka.client.id=streamkernel-oidc-sink
sink.kafka.acks=all
sink.kafka.enable.idempotence=true
sink.kafka.retries=2147483647
sink.kafka.delivery.timeout.ms=120000
sink.kafka.max.in.flight.requests.per.connection=5
sink.kafka.compression.type=lz4
sink.kafka.batch.size=65536
sink.kafka.linger.ms=5
sink.kafka.buffer.memory=268435456
sink.kafka.max.request.size=10485760

sink.kafka.security.protocol=SASL_PLAINTEXT
sink.kafka.oidc.enabled=true
sink.kafka.oidc.token.endpoint.url=http://localhost:8085/realms/streamkernel/protocol/openid-connect/token
sink.kafka.oidc.client.id=streamkernel-kafka-sink
sink.kafka.oidc.client.secret=streamkernel-sink-secret

# --- Cache / DLQ / Security ---
cache.type=NOOP
dlq.type=DEVNULL
security.type=PERMIT_ALL

# --- StreamKernel backpressure ---
streamkernel.sink.inflight.max=4096
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8086
metrics.tag.profile=sk-synthetic-to-kafka-sink-oidc
metrics.tag.mode=local
metrics.tag.run_id=${env:SK_RUN_ID:dev}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=5
streamkernel.print.config.enabled=true
streamkernel.bench.auto.stop.after.seconds=60
streamkernel.bench.print.cfg.keys=source.type,pipeline.parallelism,pipeline.batch.size,transform.chain,sink.type,sink.kafka.bootstrap.servers,streamkernel.sink.inflight.max,metrics.provider
