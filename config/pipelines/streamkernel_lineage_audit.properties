############################################################
# streamkernel_lineage_audit.properties
# Purpose : Synthetic -> STRING_TO_WIREEVENT -> Kafka
# Goal    : Public provenance/audit row that stamps stable lineage headers
#           without model artifact loading or private inference profiles.
############################################################

streamkernel.provenance.enabled=true

# --- Pipeline ---
pipeline.id=sk-lineage-audit
pipeline.parallelism=4
pipeline.batch.size=64
pipeline.drain.timeout.ms=180000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# --- Source: Synthetic ---
source.type=SYNTHETIC
source.synthetic.payload.size=256
source.synthetic.buffer.size=131072
source.synthetic.high.entropy=false
source.synthetic.text.profile=SUPPORT
source.unsafe.reuse.batch=true
streamkernel.source.fetch.lock=false

# --- Transform chain ---
transform.chain=STRING_TO_WIREEVENT
transform.string_to_wireevent.use.payload.id.as.key=true
transform.string_to_wireevent.trim=true
transform.version=wireevent-kafka-lineage-v1
feature.version=public-lineage-features-v1
prompt.version=n/a
model.name=deterministic-public-lineage-contract
model.alias=public
model.version=1
model.stage=demo

# --- Sink: Kafka ---
sink.type=KAFKA
sink.plugin.id=KAFKA
sink.kafka.bootstrap.servers=localhost:9092
sink.kafka.topic=streamkernel-lineage-audit
sink.kafka.client.id=sk-lineage-audit
sink.kafka.acks=all
sink.kafka.enable.idempotence=true
sink.kafka.retries=2147483647
sink.kafka.delivery.timeout.ms=120000
sink.kafka.max.in.flight.requests.per.connection=5
sink.kafka.compression.type=lz4
sink.kafka.batch.size=131072
sink.kafka.linger.ms=5
sink.kafka.buffer.memory=268435456
sink.kafka.max.block.ms=5000

# --- Cache / DLQ / Security ---
cache.type=NOOP
dlq.type=DEVNULL
security.type=PERMIT_ALL

# --- StreamKernel backpressure ---
streamkernel.sink.inflight.max=1024
streamkernel.sink.batch.copy=false
streamkernel.executor.mode=FIXED
streamkernel.latency.enabled=false
streamkernel.metrics.latency.enabled=false
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8080
metrics.tag.profile=sk-lineage-audit
metrics.tag.mode=local
metrics.tag.run_id=${sys:sk.run.id:lineage-audit-local}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=5
streamkernel.print.config.enabled=true
streamkernel.bench.auto.stop.after.seconds=60
streamkernel.bench.print.cfg.keys=source.synthetic.text.profile,pipeline.parallelism,pipeline.batch.size,transform.chain,transform.version,model.name,model.version,feature.version,prompt.version,sink.type,sink.kafka.topic,metrics.provider
