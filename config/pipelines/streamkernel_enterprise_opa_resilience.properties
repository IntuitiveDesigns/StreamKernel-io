############################################################
# streamkernel_enterprise_opa_resilience.properties
# Purpose : OPA sidecar failure resilience validation.
#           Synthetic -> NOOP -> Kafka (mTLS) with OPA_SIDECAR security,
#           fail.open=false (fail-closed).
# Goal    : Prove that when OPA becomes unavailable, StreamKernel:
#             1. Denies all batches immediately (fail-closed, no data leak)
#             2. Does not hang, OOM, or corrupt state
#             3. Resumes full throughput within one TTL window after OPA recovers
#           This is the enterprise security team's first question:
#           "What happens to data if your policy engine goes down?"
#
# Run protocol (three phases — document each in acquisition materials):
#
#   Phase 1 — Healthy baseline (5 min):
#     Start OPA: docker compose up -d opa
#     Start pipeline. Confirm PROC_EPS matches mTLS baseline.
#     Confirm OPA log shows allow decisions: docker logs opa --follow
#
#   Phase 2 — OPA failure injection (2 min):
#     Kill OPA mid-run: docker stop opa
#     Within security.opa.http.connect.timeout.ms + security.opa.http.request.timeout.ms
#     (500ms + 500ms = ~1s), batches should begin failing.
#     Expected: PROC_EPS drops to 0. DROPPED increases. No unhandled exceptions.
#     Expected log pattern: "Failed to contact OPA sidecar" (throttled to 1/10s)
#     CRITICAL CHECK: confirm no records reach the Kafka topic during this window.
#       docker exec broker kafka-consumer-groups --bootstrap-server localhost:9092 \
#         --describe --group streamkernel-monitor
#
#   Phase 3 — Recovery (2 min):
#     Restart OPA: docker compose up -d opa
#     OPA needs ~2s to load policy bundle.
#     After security.opa.cache.ttl.ms (1000ms), new decisions will be fetched.
#     Expected: PROC_EPS recovers to Phase 1 baseline within one speedometer window.
#     Expected: No pipeline restart required.
#
# Acquisition evidence targets:
#   - Log: Zero records produced to Kafka during Phase 2 (consumer offset frozen)
#   - Log: "Failed to contact OPA sidecar" appears, not an unhandled exception
#   - Speedometer: PROC_EPS recovers without operator intervention in Phase 3
#   - Grafana: opa_call_error_total increases during Phase 2, drops in Phase 3
############################################################

app.service.account=service-account-1

# --- Pipeline ---
pipeline.id=sk-enterprise-opa-resilience
pipeline.parallelism=12
pipeline.batch.size=1000
pipeline.drain.timeout.ms=15000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# --- Source: Synthetic ---
source.type=SYNTHETIC
source.synthetic.payload.size=1024
source.synthetic.buffer.size=524288
source.synthetic.entropy=LOW
source.unsafe.reuse.batch=true
streamkernel.source.fetch.lock=false

# --- Transform / Cache ---
transform.chain=NOOP
cache.type=NOOP

# --- Sink: Kafka (mTLS — same topology as enterprise baseline) ---
sink.type=KAFKA
sink.plugin.id=KAFKA
sink.kafka.bootstrap.servers=localhost:9093
sink.kafka.topic=arena-bench-test
dlq.type=DEVNULL
sink.kafka.acks=all
sink.kafka.enable.idempotence=true
sink.kafka.retries=2147483647
sink.kafka.delivery.timeout.ms=120000
sink.kafka.max.in.flight.requests.per.connection=5
sink.kafka.compression.type=lz4
sink.kafka.batch.size=65536
sink.kafka.linger.ms=5
sink.kafka.buffer.memory=268435456
sink.kafka.max.request.size=10485760

# Kafka mTLS
kafka.security.protocol=SSL
kafka.ssl.endpoint.identification.algorithm=
kafka.ssl.keystore.location=secrets/kafka.client.keystore.p12
kafka.ssl.keystore.type=PKCS12
kafka.ssl.keystore.password=changeit
kafka.ssl.key.password=changeit
kafka.ssl.truststore.location=secrets/kafka.truststore.p12
kafka.ssl.truststore.type=PKCS12
kafka.ssl.truststore.password=changeit

# --- StreamKernel backpressure ---
streamkernel.sink.inflight.max=200000
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8082
metrics.tag.profile=sk-enterprise-opa-resilience
metrics.tag.mode=default
metrics.tag.run_id=${env:SK_RUN_ID:dev}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
# 10s window: long enough to clearly show the failure and recovery phases
# as discrete steps in Grafana rather than noise.
streamkernel.speedometer.window.seconds=10
streamkernel.print.config.enabled=true
streamkernel.bench.print.cfg.keys=pipeline.parallelism,pipeline.batch.size,transform.chain,streamkernel.speedometer.window.seconds,streamkernel.sink.inflight.max,metrics.provider

# --- Security: OPA RBAC, fail-closed ---
security.type=OPA_SIDECAR
security.opa.url=http://127.0.0.1:8181/v1/data/streamkernel/authz/allow
security.opa.principal=service-account-1
security.opa.action=write
security.opa.resource=arena-bench-test
security.auth.ttl.ms=30000
# FAIL-CLOSED: deny all batches if OPA is unreachable.
# This is the configuration under test. Do not change to fail.open=true.
security.opa.fail.open=false
security.opa.cache.ttl.ms=30000
# Tight timeouts: ensures failure detection happens within ~1s of OPA going down.
# This is what makes Phase 2 visible as a clean step function in Grafana.
security.opa.http.connect.timeout.ms=2000
security.opa.http.request.timeout.ms=10000
