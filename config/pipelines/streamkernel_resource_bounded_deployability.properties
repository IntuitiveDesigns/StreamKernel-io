############################################################
# streamkernel_resource_bounded_deployability.properties
# Purpose : Synthetic -> STRING_TO_WIREEVENT -> Kafka
#           Constrained to 4 logical cores, 2GB JVM heap.
# Goal    : Prove StreamKernel is deployable on shared/modest infrastructure,
#           not just on dedicated benchmark hardware.
#           Platform engineers at enterprise buyers evaluate licensing cost
#           against per-core or per-GB pricing models. A credible result on
#           constrained hardware directly affects the commercial conversation.
#
# JVM flags required for this profile (set in your Gradle run task or launch script):
#   -Xmx1800m -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=20
#   -XX:ParallelGCThreads=2 -XX:ConcGCThreads=1
#   Do NOT use -Xmx4g or larger for this run. The point is the constraint.
#
# CPU constraint:
#   Run with pipeline.parallelism=4 to simulate a 4-core deployment.
#   On a machine with more cores, the JVM will still use them for GC and
#   Kafka network threads — this is realistic, not artificial.
#
# Target outcomes (conservative, credible for acquisition materials):
#   - PROC_EPS > 50,000 sustained (STRING_TO_WIREEVENT + Kafka, no AI)
#   - MEM < 1500MB throughout (headroom under the 1800MB Xmx ceiling)
#   - P99 latency < 50ms
#   - Zero GC pauses > 50ms (visible in Grafana JVM metrics)
#   - DROPPED=0, EMPTY=0
#
# Why this matters:
#   Peak numbers on a 96-core machine are not what a platform team buys.
#   A sustained 50K+ EPS on 4 cores and 2GB is a deployability proof that
#   maps directly to a t3.medium or equivalent cloud instance. That's a
#   cost-per-event number a buyer can put in a spreadsheet.
############################################################

# --- Pipeline ---
pipeline.id=sk-resource-bounded-deployability
# 4 workers = 4-core simulation. Do not increase for this profile.
pipeline.parallelism=4
pipeline.batch.size=500
pipeline.drain.timeout.ms=15000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# --- Source: Synthetic ---
# 512-byte payload: production-representative WireEvent size.
# Keep this consistent across all baseline profiles for fair comparison.
source.type=SYNTHETIC
source.synthetic.payload.size=512
source.synthetic.buffer.size=262144
source.synthetic.entropy=LOW
source.unsafe.reuse.batch=true
streamkernel.source.fetch.lock=false

# --- Transform ---
transform.chain=STRING_TO_WIREEVENT
transform.string_to_wireevent.default.key=sk
transform.string_to_wireevent.use.payload.id.as.key=true

# --- Sink: Kafka ---
sink.type=KAFKA
sink.plugin.id=KAFKA
sink.kafka.bootstrap.servers=localhost:9092
sink.kafka.topic=arena-bench-test
dlq.type=DEVNULL
sink.kafka.acks=1
sink.kafka.linger.ms=10
sink.kafka.batch.size=131072
# 64MB buffer: conservative for 2GB heap. Leaves headroom for JVM + pipeline.
sink.kafka.buffer.memory=67108864
sink.kafka.compression.type=lz4
sink.kafka.max.in.flight.requests.per.connection=5

# --- StreamKernel backpressure ---
# Ceiling = parallelism x batchSize x 4 = 4 x 500 x 4 = 8000
# Conservative multiplier to keep heap pressure low on 2GB.
streamkernel.sink.inflight.max=8000
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
# Prometheus on a separate port from other profiles.
# Keep metrics overhead low: no histogram cardinality explosion on constrained heap.
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8083
metrics.tag.profile=sk-resource-bounded-deployability
metrics.tag.mode=constrained-4core-2gb
metrics.tag.run_id=${env:SK_RUN_ID:dev}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=10
streamkernel.print.config.enabled=true
streamkernel.bench.print.cfg.keys=pipeline.parallelism,pipeline.batch.size,transform.chain,streamkernel.speedometer.window.seconds,streamkernel.sink.inflight.max,metrics.provider

# --- Security ---
security.type=PERMIT_ALL
