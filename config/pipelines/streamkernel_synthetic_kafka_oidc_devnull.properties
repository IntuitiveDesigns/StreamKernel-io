############################################################
# streamkernel_synthetic_kafka_oidc_devnull.properties
#
# Purpose : SYNTHETIC source -> Kafka sink over OIDC (SASL/OAUTHBEARER)
#
# Use Case: Validates Kafka OIDC authentication on the producer (sink) path
#           using a self-contained SYNTHETIC source. No pre-loaded topic or
#           external producer required. Anyone with the Keycloak + Kafka
#           Docker Compose stack can reproduce this run.
#
# Stack   : Keycloak (localhost:8085, realm=streamkernel)
#           Kafka    (localhost:9095, SASL_PLAINTEXT + OAUTHBEARER)
#           Topic    : streamkernel-oidc (4 partitions)
#
# Run     : java -jar streamkernel.jar \
#               --config streamkernel_synthetic_kafka_oidc_devnull.properties
############################################################

# ===========================================================
# PROVENANCE
# ===========================================================
streamkernel.provenance.enabled=true

# ===========================================================
# PIPELINE
# ===========================================================
pipeline.id=sk-synthetic-kafka-oidc-devnull
pipeline.parallelism=4
pipeline.batch.size=64
pipeline.drain.timeout.ms=15000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# ===========================================================
# SOURCE: SYNTHETIC
# Drives the pipeline without any external broker dependency.
# Prebuilds a 512K-slot ring of 256-byte payloads at startup.
# fetchBatch(64) returns a zero-allocation view over the ring,
# so this source will never be the throughput bottleneck.
# ===========================================================
source.type=SYNTHETIC
source.synthetic.mode=INLINE
source.synthetic.payload.size=256
source.synthetic.entropy=LOW
source.synthetic.buffer.size=524288
source.synthetic.fixture.pool.size=2048
source.synthetic.id.prefix=sk-oidc-
source.synthetic.seq.start=0
source.synthetic.fixed.timestamp=true

# ===========================================================
# TRANSFORM
# NOOP: payload passes through unchanged.
# Swap in another transformer here to test transform + OIDC together.
# ===========================================================
transform.chain=NOOP

# ===========================================================
# SINK: KAFKA over OIDC (SASL_PLAINTEXT + OAUTHBEARER)
#
# This is the OIDC-exercising leg of the pipeline.
# StreamKernel will acquire a bearer token from Keycloak
# via client_credentials grant and present it to the broker
# on every produce request, refreshing before expiry.
#
# Token endpoint : http://localhost:8085/realms/streamkernel
#                  /protocol/openid-connect/token
# Client         : streamkernel-kafka-sink
# Secret         : streamkernel-sink-secret
# Mechanism      : OAUTHBEARER (RFC 7523 client credentials)
# ===========================================================
sink.type=KAFKA
sink.plugin.id=KAFKA

sink.kafka.bootstrap.servers=localhost:9095
sink.kafka.topic=streamkernel-oidc
sink.kafka.client.id=streamkernel-oidc-sink
sink.kafka.acks=1
sink.kafka.retries=3
sink.kafka.retry.backoff.ms=100
sink.kafka.linger.ms=5
sink.kafka.batch.size=65536
sink.kafka.buffer.memory=33554432
sink.kafka.compression.type=none
sink.kafka.max.block.ms=5000
sink.kafka.request.timeout.ms=15000
sink.kafka.delivery.timeout.ms=30000

sink.kafka.security.protocol=SASL_PLAINTEXT
sink.kafka.oidc.enabled=true
sink.kafka.oidc.token.endpoint.url=http://localhost:8085/realms/streamkernel/protocol/openid-connect/token
sink.kafka.oidc.client.id=streamkernel-kafka-sink
sink.kafka.oidc.client.secret=streamkernel-sink-secret

# ===========================================================
# DLQ
# DEVNULL: failed sink records are discarded and counted.
# Swap to KAFKA DLQ sink for production failure capture.
# ===========================================================
dlq.type=DEVNULL

# ===========================================================
# CACHE
# ===========================================================
cache.type=NOOP

# ===========================================================
# BACKPRESSURE
# ===========================================================
streamkernel.sink.inflight.max=4096
streamkernel.sink.error.log.interval.ms=1000

# ===========================================================
# METRICS: Prometheus
# Scrape at http://localhost:8087/metrics during the run.
# JVM binders registered: memory, threads, GC, heap pressure,
# classloader. Pipeline tags: mode, pipeline, run_id, profile.
# ===========================================================
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8087
metrics.tag.profile=sk-synthetic-kafka-oidc
metrics.tag.mode=local
metrics.tag.run_id=${env:SK_RUN_ID:dev}

# ===========================================================
# BENCH + SPEEDOMETER
# 120-second auto-stop. 5-second speedometer windows.
# Watch PROC_EPS and OUT_EPS in the BENCH lines to confirm
# records are flowing through the OIDC-authed Kafka sink.
# DROPPED=0 and errorTotal=0 at shutdown = clean OIDC run.
# ===========================================================
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=5
streamkernel.print.config.enabled=true
streamkernel.bench.auto.stop.after.seconds=120
streamkernel.bench.print.cfg.keys=source.type,\
  source.synthetic.payload.size,\
  pipeline.parallelism,\
  pipeline.batch.size,\
  transform.chain,\
  sink.type,\
  sink.kafka.bootstrap.servers,\
  sink.kafka.topic,\
  sink.kafka.oidc.enabled,\
  sink.kafka.oidc.token.endpoint.url,\
  metrics.provider

# ===========================================================
# SECURITY
# PERMIT_ALL for local dev. Swap to OPA_SIDECAR for
# enterprise / air-gapped deployments.
# ===========================================================
security.type=PERMIT_ALL
