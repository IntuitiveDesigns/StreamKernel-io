############################################################
# streamkernel_mongodb_insert_baseline.properties
# Purpose : Synthetic -> STRING_TO_WIREEVENT -> MongoDB (pure insertMany)
# Goal    : Raw MongoDB write throughput ceiling.
#           Uses MONGO_INSERT plugin ? pure insertMany, no upsert,
#           no index lookup, no vector requirement.
#
# Run this before comparison profiles that add extra sink work.
# The delta between this run and the vector run is the cost of:
#   - Any optional enrichment transform
#   - float[] -> List<Double> boxing per record
#   - ReplaceOneModel upsert vs raw insertMany
#
# Expected range on local Docker (NVMe SSD):
#   50K-200K docs/sec -- WiredTiger journal flush rate is the ceiling.
#   If you see < 30K, check MongoDB container disk I/O.
#   OUT_EPS should track PROC_EPS closely -- if there is a large
#   gap, MongoDB is the bottleneck; reduce mongodb.bulk.max.ops
#   or pipeline.batch.size to give the driver smaller flushes.
############################################################

# --- Pipeline ---
pipeline.id=sk-mongodb-insert-baseline
pipeline.parallelism=12
pipeline.batch.size=500
pipeline.drain.timeout.ms=30000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=100
pipeline.source.backoff.max.ms=2000

# --- Source: Synthetic ---
source.type=SYNTHETIC
source.synthetic.payload.size=512
source.synthetic.buffer.size=4194304
source.synthetic.entropy=HIGH
source.unsafe.reuse.batch=false
streamkernel.source.fetch.lock=false

# --- Transform ---
transform.chain=STRING_TO_WIREEVENT
transform.string_to_wireevent.default.key=sk
transform.string_to_wireevent.use.payload.id.as.key=false
# Raw insert ceiling benchmark; provenance/lineage overhead is covered by
# dedicated enterprise evidence profiles.
streamkernel.provenance.enabled=false

# --- Sink: MongoDB Insert ---
sink.type=MONGO_INSERT
sink.plugin.id=MONGO_INSERT
mongodb.uri=mongodb://localhost:27017
mongodb.database=support_db
mongodb.collection=sk_insert_baseline
mongodb.bulk.max.ops=500
# Match pipeline.batch.size. One pipeline batch -> one insertMany call.
mongodb.bulk.ordered=false
# Unordered insertMany: MongoDB driver can pipeline writes to WiredTiger
# without waiting for each document's acknowledgment before sending the next.
dlq.type=DEVNULL

# --- StreamKernel backpressure ---
streamkernel.sink.inflight.max=18000
# 12 workers x 500 batch x 3 = 18,000 ceiling.
# Lower to 6000 if OUT_EPS is consistently below PROC_EPS.
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8080
metrics.tag.profile=sk-mongodb-insert-baseline
metrics.tag.mode=default
metrics.tag.run_id=${env:SK_RUN_ID:dev}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=5
streamkernel.print.config.enabled=true
streamkernel.bench.print.cfg.keys=pipeline.parallelism,pipeline.batch.size,transform.chain,streamkernel.speedometer.window.seconds,streamkernel.sink.inflight.max,metrics.provider

# --- Security ---
security.type=PERMIT_ALL
