############################################################
# streamkernel_enterprise_dlq_kafka.properties
# Purpose : Enterprise dead-letter queue validation.
#           Synthetic -> STRING_TO_WIREEVENT -> Kafka (primary)
#                                            -> Kafka DLQ (on failure)
# Goal    : Prove the DLQ path is live, durable, and observable under load.
#           A buyer's data engineering team will ask: "What happens to bad
#           records?" This profile answers that question with running evidence.
#
# Run protocol:
#   Step 1 — Baseline (DLQ idle):
#     Run with source.synthetic.entropy=LOW and a healthy primary topic.
#     Confirm DLQ topic receives 0 records. DROPPED=0 throughout.
#
#   Step 2 — Inject failures (DLQ active):
#     Option A: Point sink.kafka.topic at a non-existent topic with
#               auto-create disabled on the broker. Every batch will DLQ.
#     Option B: Reduce sink.kafka.max.request.size to 1024 so oversized
#               records fail serialization and route to DLQ.
#     Option C: Stop the primary broker mid-run (docker stop broker).
#               After delivery.timeout.ms, records should DLQ.
#     Confirm: DLQ topic receives records, PROC_TOTAL keeps climbing,
#              DROPPED=0 (records are routed, not silently dropped).
#
#   Step 3 — Recovery:
#     Restore primary broker / topic. Confirm pipeline resumes without
#     restart. DLQ topic stops receiving new records.
#
# Acquisition evidence targets:
#   - Grafana: sk_dlq_routed_total increases during failure window
#   - Grafana: PROC_EPS recovers to baseline within one speedometer window
#   - Log: No OOM, no unhandled exception, no silent data loss
#   - Log: Clean "DLQ routed N records" INFO lines (not ERROR storms)
############################################################

# --- Pipeline ---
pipeline.id=sk-enterprise-dlq-kafka
pipeline.parallelism=12
pipeline.batch.size=1000
pipeline.drain.timeout.ms=15000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# --- Source: Synthetic ---
source.type=SYNTHETIC
source.synthetic.payload.size=512
source.synthetic.buffer.size=524288
source.synthetic.entropy=LOW
source.unsafe.reuse.batch=true
streamkernel.source.fetch.lock=false

# --- Transform ---
transform.chain=STRING_TO_WIREEVENT
transform.string_to_wireevent.default.key=sk
transform.string_to_wireevent.use.payload.id.as.key=true

# --- Primary Sink: Kafka ---
sink.type=KAFKA
sink.plugin.id=KAFKA
sink.kafka.bootstrap.servers=localhost:9092
sink.kafka.topic=arena-bench-test
sink.kafka.acks=all
sink.kafka.enable.idempotence=true
sink.kafka.retries=2147483647
sink.kafka.delivery.timeout.ms=60000
sink.kafka.max.in.flight.requests.per.connection=5
sink.kafka.linger.ms=5
sink.kafka.batch.size=262144
sink.kafka.buffer.memory=268435456
sink.kafka.compression.type=lz4
# To inject failures for Step 2 Option B: reduce to 1024
sink.kafka.max.request.size=10485760

# --- DLQ Sink: Kafka ---
# The DLQ topic must exist on the broker before running this profile.
# Create it: docker exec broker kafka-topics --create \
#   --topic streamkernel-dlq --partitions 12 --replication-factor 1 \
#   --bootstrap-server localhost:9092
dlq.type=KAFKA
dlq.kafka.bootstrap.servers=localhost:9092
dlq.kafka.topic=streamkernel-dlq
# DLQ uses acks=all regardless of primary sink config.
# Records that reach the DLQ must not be lost.
dlq.kafka.acks=all
dlq.kafka.enable.idempotence=true
dlq.kafka.retries=2147483647
dlq.kafka.linger.ms=5
dlq.kafka.batch.size=65536
dlq.kafka.compression.type=lz4

# --- StreamKernel backpressure ---
streamkernel.sink.inflight.max=500000
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8082
metrics.tag.profile=sk-enterprise-dlq-kafka
metrics.tag.mode=default
metrics.tag.run_id=${env:SK_RUN_ID:dev}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=10
streamkernel.print.config.enabled=true
streamkernel.bench.print.cfg.keys=pipeline.parallelism,pipeline.batch.size,transform.chain,streamkernel.speedometer.window.seconds,streamkernel.sink.inflight.max,metrics.provider

# --- Security ---
security.type=PERMIT_ALL
