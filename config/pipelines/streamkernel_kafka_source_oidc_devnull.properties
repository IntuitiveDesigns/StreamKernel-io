############################################################
# streamkernel_kafka_source_oidc_devnull.properties
# Purpose : Kafka (OIDC) -> DEVNULL
# Goal    : Exercise Kafka source OIDC auth using the same local
#           Docker Compose broker and Keycloak setup as the sink test.
############################################################

streamkernel.provenance.enabled=true

# --- Pipeline ---
pipeline.id=sk-kafka-source-oidc-devnull
pipeline.parallelism=4
pipeline.batch.size=64
pipeline.drain.timeout.ms=15000
pipeline.source.fail.fast=false
pipeline.source.backoff.initial.ms=250
pipeline.source.backoff.max.ms=5000

# --- Source: Kafka over OIDC ---
source.type=KAFKA
source.kafka.bootstrap.servers=localhost:9095
source.kafka.topic=streamkernel-oidc
source.kafka.group.id=${env:SK_RUN_ID:streamkernel-oidc-source}
source.kafka.client.id=streamkernel-oidc-source
source.kafka.max.poll.records=500
source.kafka.poll.ms=25
source.kafka.fetch.min.bytes=1
source.kafka.fetch.max.wait.ms=100
source.kafka.enable.auto.commit=false
source.kafka.auto.offset.reset=earliest
source.kafka.commit.on.disconnect=true

source.kafka.security.protocol=SASL_PLAINTEXT
source.kafka.oidc.enabled=true
source.kafka.oidc.token.endpoint.url=http://localhost:8085/realms/streamkernel/protocol/openid-connect/token
source.kafka.oidc.client.id=streamkernel-kafka-source
source.kafka.oidc.client.secret=streamkernel-source-secret

# --- Transform / Sink ---
transform.chain=NOOP
sink.type=DEVNULL
sink.plugin.id=DEVNULL
dlq.type=DEVNULL
cache.type=NOOP

# --- StreamKernel backpressure ---
streamkernel.sink.inflight.max=4096
streamkernel.sink.error.log.interval.ms=1000

# --- Metrics ---
metrics.provider=PROMETHEUS
metrics.prometheus.enabled=true
metrics.prometheus.port=8087
metrics.tag.profile=sk-kafka-source-oidc-devnull
metrics.tag.mode=local
metrics.tag.run_id=${env:SK_RUN_ID:dev}

# --- Bench / Speedometer ---
streamkernel.bench.enabled=true
streamkernel.speedometer.enabled=true
streamkernel.speedometer.window.seconds=5
streamkernel.print.config.enabled=true
streamkernel.bench.auto.stop.after.seconds=60
streamkernel.bench.print.cfg.keys=source.type,source.kafka.bootstrap.servers,source.kafka.topic,pipeline.parallelism,pipeline.batch.size,transform.chain,sink.type,metrics.provider

# --- Security ---
security.type=PERMIT_ALL
