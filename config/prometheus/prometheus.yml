global:
  scrape_interval: 2s
  evaluation_interval: 2s
  scrape_timeout: 2s

rule_files:
  - /etc/prometheus/alerts/*.yml
  - /etc/prometheus/*.rules.yml

scrape_configs:

  # =====================================================================
  # StreamKernel (running on HOST via gradlew)
  #
  # Each profile uses a fixed metrics port. Prometheus scrapes all of them
  # so that whichever benchmark is active will always have a live target.
  # Targets that are not running simply show as "down" — this is expected
  # and does not affect the targets that are healthy.
  #
  # Port assignments across profiles:
  #   8080 — default / baseline profiles (ALO, EOS, devnull, uncorked,
  #           resource-bounded, DLQ)
  #   8082 — cache / enterprise profiles (source uncorked alt, enterprise
  #           mTLS OPA, OPA resilience, backpressure saturation)
  #   8083 — resource-bounded deployability (constrained heap run)
  #   8084 - reserved for optional HTTP profile experiments
  # =====================================================================
  - job_name: "streamkernel-8080"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          app: "streamkernel"
          component: "runtime"
          metrics_port: "8080"

  - job_name: "streamkernel-8082"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          app: "streamkernel"
          component: "runtime"
          metrics_port: "8082"

  - job_name: "streamkernel-8083"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8083"]
        labels:
          app: "streamkernel"
          component: "runtime"
          metrics_port: "8083"

  # =====================================================================
  # Prometheus self-metrics
  # =====================================================================
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          app: "prometheus"
          component: "self"

  # =====================================================================
  # Kafka Exporter
  # =====================================================================
  - job_name: "kafka-exporter"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          app: "kafka"
          component: "exporter"

  # =====================================================================
  # Node Exporter (Linux only — service is commented out in docker-compose
  # for Windows. Uncomment the node-exporter service and this target
  # together if running on Linux.)
  # =====================================================================
  # - job_name: "node-exporter"
  #   metrics_path: "/metrics"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
  #       labels:
  #         app: "node"
  #         component: "exporter"

  # =====================================================================
  # Postgres Exporter (optional — enable with: docker compose --profile postgres up)
  # =====================================================================
  # - job_name: "postgres-exporter"
  #   metrics_path: "/metrics"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
  #       labels:
  #         app: "postgres"
  #         component: "exporter"
